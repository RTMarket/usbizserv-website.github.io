      // 处理 GitHub Pages 前端路由
      (function() {
        var path = window.location.pathname;
        
        // 如果访问的是 /admin 或 /admin/xxx，重定向到 hash 路由
        if (path === '/admin' || path.startsWith('/admin/')) {
          var newPath = path.replace('/admin', '');
          window.location.replace('/#/admin' + newPath + window.location.search);
        }
      })();
    </script>
